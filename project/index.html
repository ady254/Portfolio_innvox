<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/innvox-favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InnVox - Digital Solutions & Web Development</title>
  <meta name="description"
    content="InnVox - Your partner for digital solutions, web development, AI automation, and digital marketing services." />
  <link rel="canonical" href="https://innvox.in/" />
  <meta property="og:title" content="InnVox - AI Solutions & Web Development" />
  <meta property="og:description" content="Experience Digital Evolution with InnVox" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="InnVox - Digital Solutions" />
  <meta name="twitter:image" content="/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "InnVox",
      "image": "https://innvox.in/og-image.png",
      "@id": "https://innvox.in",
      "url": "https://innvox.in",
      "telephone": "+91-XXXXXXXXXX",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Digital Hub",
        "addressLocality": "New Delhi",
        "postalCode": "110001",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 28.6139,
        "longitude": 77.2090
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://twitter.com/innvox",
        "https://linkedin.com/company/innvox"
      ]
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
